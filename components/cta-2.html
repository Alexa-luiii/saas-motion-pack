<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA 2</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans antialiased">

<section class="max-w-7xl mx-auto px-6 py-20 bg-gradient-to-r from-indigo-900 via-gray-900 to-blue-900 rounded-3xl text-center">

  <!-- CTA Heading -->
  <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">
    Accelerate Your AI Projects
  </h2>

  <!-- CTA Subheading -->
  <p class="text-gray-300 max-w-2xl mx-auto mb-8">
    Get instant access to ready-to-use AI components for enterprise SaaS dashboards and landing pages.
  </p>

  <!-- CTA Buttons -->
  <div class="flex justify-center gap-4 flex-wrap">
    <a href="#" class="px-8 py-4 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold text-lg hover:scale-105 transition duration-300">
      Get Started
    </a>
    <a href="#" class="px-8 py-4 rounded-lg border border-gray-700 text-gray-300 font-semibold hover:bg-gray-800 transition duration-300">
      Learn More
    </a>
  </div>

  <!-- Supporting Text -->
  <p class="text-gray-500 mt-4 text-sm">
    Trusted by hundreds of AI startups worldwide
  </p>

</section>

</body>
</html>
