<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Loader</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans antialiased">

<section class="max-w-7xl mx-auto px-6 py-20 text-center">

  <h2 class="text-4xl font-bold text-white mb-8">Interactive Button Loader</h2>

  <!-- Button with Loader -->
  <button id="loadButton" class="relative px-8 py-4 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold hover:scale-105 transition duration-300 flex items-center justify-center gap-2">
    <span id="btnText">Submit</span>
    <svg id="spinner" class="w-5 h-5 text-white animate-spin hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
  </button>

</section>

<script>
  const btn = document.getElementById('loadButton');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  btn.addEventListener('click', () => {
    // Show spinner
    spinner.classList.remove('hidden');
    btnText.textContent = 'Loading...';
    btn.disabled = true;

    // Simulate async action
    setTimeout(() => {
      spinner.classList.add('hidden');
      btnText.textContent = 'Done';
      btn.disabled = false;
    }, 2000);
  });
</script>

</body>
</html>
