<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CTA 1</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans antialiased">

<section class="max-w-7xl mx-auto px-6 py-20 bg-gray-900 rounded-2xl text-center">

  <!-- CTA Heading -->
  <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">
    Supercharge Your AI Workflow
  </h2>

  <!-- CTA Subheading -->
  <p class="text-gray-400 max-w-2xl mx-auto mb-8">
    Get started with our enterprise-ready AI components and accelerate your SaaS development.
  </p>

  <!-- CTA Button -->
  <a href="#" class="inline-block px-8 py-4 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold text-lg hover:scale-105 transition duration-300">
    Get Started
  </a>

  <!-- Small Supporting Text -->
  <p class="text-gray-500 mt-4 text-sm">
    No credit card required • Instant access
  </p>

</section>

</body>
</html>
