<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 1</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

</head>

<body class="bg-gray-950 text-gray-400 font-sans">

<section class="max-w-7xl mx-auto px-6 py-24 text-center">

  <!-- Badge -->
  <div class="inline-block mb-6 px-4 py-1 text-sm rounded-full bg-gray-900 border border-gray-800 text-gray-300">
    AI Infrastructure Platform
  </div>

  <!-- Heading -->
  <h1 class="text-5xl md:text-6xl font-bold text-white mb-6 leading-tight">
    Enterprise AI Infrastructure
    <span class="bg-gradient-to-r from-indigo-500 to-blue-500 bg-clip-text text-transparent">
      for the Future
    </span>
  </h1>

  <!-- Description -->
  <p class="text-lg text-gray-400 max-w-2xl mx-auto mb-10">
    Deploy scalable artificial intelligence infrastructure designed for
    modern enterprises, automation pipelines, and intelligent data systems.
  </p>

  <!-- Buttons -->
  <div class="flex justify-center gap-4 flex-wrap">

    <button class="px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold hover:scale-105 transition duration-300 shadow-lg shadow-indigo-500/20">
      Get Started
    </button>

    <button class="px-6 py-3 rounded-lg border border-gray-700 text-gray-300 hover:bg-gray-900 transition duration-300">
      View Documentation
    </button>

  </div>

</section>

</body>
</html>
