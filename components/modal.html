<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Component</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-400 font-sans antialiased">

<section class="max-w-7xl mx-auto px-6 py-20 text-center">

  <!-- Trigger Button -->
  <button id="openModal" class="px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold hover:scale-105 transition duration-300">
    Open Modal
  </button>

</section>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
  <div class="bg-gray-900 rounded-xl max-w-lg w-full p-8 relative">
    
    <!-- Close Button -->
    <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white">
      &times;
    </button>

    <!-- Modal Content -->
    <h2 class="text-3xl font-bold text-white mb-4">Enterprise AI Modal</h2>
    <p class="text-gray-400 mb-6">
      Display important information, forms, or CTAs in this reusable modal component.
    </p>
    <button class="px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold hover:scale-105 transition duration-300">
      Take Action
    </button>
  </div>
</div>

<!-- Modal Script -->
<script>
  const openModal = document.getElementById('openModal');
  const closeModal = document.getElementById('closeModal');
  const modal = document.getElementById('modal');

  openModal.addEventListener('click', () => {
    modal.classList.remove('opacity-0', 'pointer-events-none');
    modal.classList.add('opacity-100');
  });

  closeModal.addEventListener('click', () => {
    modal.classList.add('opacity-0', 'pointer-events-none');
    modal.classList.remove('opacity-100');
  });

  // Close modal on click outside
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.add('opacity-0', 'pointer-events-none');
      modal.classList.remove('opacity-100');
    }
  });
</script>

</body>
</html>
