<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 3</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans">

<section class="max-w-7xl mx-auto px-6 py-28 text-center relative">

  <!-- Background Glow -->
  <div class="absolute inset-0 flex justify-center items-center -z-10">
    <div class="w-96 h-96 bg-gradient-to-r from-indigo-500/20 to-blue-500/20 blur-3xl rounded-full"></div>
  </div>

  <!-- Heading -->
  <h1 class="text-5xl md:text-6xl font-bold text-white mb-6 leading-tight">
    Transform Data into
    <span class="bg-gradient-to-r from-indigo-500 to-blue-500 bg-clip-text text-transparent">
      Strategic Advantage
    </span>
  </h1>

  <!-- Description -->
  <p class="text-lg text-gray-400 max-w-2xl mx-auto mb-10">
    Unlock the full potential of your data using powerful artificial
    intelligence tools designed for modern companies and digital platforms.
  </p>

  <!-- Email Signup -->
  <div class="flex justify-center flex-wrap gap-4 max-w-xl mx-auto">

    <input
      type="email"
      placeholder="Enter your email"
      class="px-5 py-3 rounded-lg bg-gray-900 border border-gray-800 text-gray-200 w-full md:w-auto flex-1 outline-none focus:border-indigo-500"
    />

    <button class="px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold hover:scale-105 transition duration-300 shadow-lg shadow-indigo-500/20">
      Start Free Trial
    </button>

  </div>

</section>

</body>
</html>
