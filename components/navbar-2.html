<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar 2 – Modern AI Theme</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'brand-indigo': '#4f46e5',
            'brand-blue': '#3b82f6'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-950 text-gray-400 font-sans">

<!-- Navbar 2 -->
<nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between bg-gradient-to-r from-brand-indigo to-brand-blue rounded-xl shadow-lg">
  
  <!-- Logo -->
  <div class="text-white font-bold text-2xl tracking-wide">
    <span class="text-brand-blue">AI</span> Hub
  </div>

  <!-- Menu Links -->
  <ul class="hidden md:flex gap-10 text-gray-200 font-medium">
    <li><a href="#home" class="hover:text-white transition duration-300">Home</a></li>
    <li><a href="#services" class="hover:text-white transition duration-300">Services</a></li>
    <li><a href="#pricing" class="hover:text-white transition duration-300">Pricing</a></li>
    <li><a href="#contact" class="hover:text-white transition duration-300">Contact</a></li>
  </ul>

  <!-- CTA Button -->
  <a href="#login" class="hidden md:inline-block px-5 py-2 rounded-lg bg-white text-brand-indigo font-semibold shadow hover:scale-105 transition duration-300">
    Login
  </a>

  <!-- Mobile Hamburger -->
  <div class="md:hidden flex items-center">
    <button id="mobile-menu-btn" class="focus:outline-none">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Mobile Menu -->
<div id="mobile-menu" class="hidden md:hidden bg-gray-900 mt-2 rounded-xl px-6 py-4 shadow-lg">
  <ul class="flex flex-col space-y-4">
    <li><a href="#home" class="text-white font-medium hover:text-brand-blue transition duration-300">Home</a></li>
    <li><a href="#services" class="text-white font-medium hover:text-brand-blue transition duration-300">Services</a></li>
    <li><a href="#pricing" class="text-white font-medium hover:text-brand-blue transition duration-300">Pricing</a></li>
    <li><a href="#contact" class="text-white font-medium hover:text-brand-blue transition duration-300">Contact</a></li>
    <li><a href="#login" class="px-4 py-2 bg-brand-blue text-white rounded-lg font-semibold hover:scale-105 transition duration-300">Login</a></li>
  </ul>
</div>

<script>
  const menuBtn = document.getElementById('mobile-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');

  menuBtn.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
  });

  // Smooth scrolling for menu links
  document.querySelectorAll('nav a').forEach(link => {
    link.addEventListener('click', function(e){
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if(target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
</script>

</body>
</html>
