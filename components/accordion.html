<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Component</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans antialiased">

<section class="max-w-3xl mx-auto px-6 py-20">

  <h2 class="text-4xl font-bold text-white mb-8 text-center">FAQ & Features Accordion</h2>

  <div class="space-y-4">

    <!-- Accordion Item 1 -->
    <div class="bg-gray-900 rounded-xl border border-gray-800">
      <button class="w-full text-left px-6 py-4 flex justify-between items-center focus:outline-none accordion-header">
        <span class="font-semibold text-white">What is Corporate AI?</span>
        <span class="text-gray-400">+</span>
      </button>
      <div class="px-6 py-4 hidden accordion-body text-gray-400">
        Corporate AI provides scalable AI solutions for modern enterprises to automate tasks efficiently.
      </div>
    </div>

    <!-- Accordion Item 2 -->
    <div class="bg-gray-900 rounded-xl border border-gray-800">
      <button class="w-full text-left px-6 py-4 flex justify-between items-center focus:outline-none accordion-header">
        <span class="font-semibold text-white">How does AI improve workflows?</span>
        <span class="text-gray-400">+</span>
      </button>
      <div class="px-6 py-4 hidden accordion-body text-gray-400">
        By automating repetitive tasks, predictive analytics, and AI-powered decision making.
      </div>
    </div>

    <!-- Accordion Item 3 -->
    <div class="bg-gray-900 rounded-xl border border-gray-800">
      <button class="w-full text-left px-6 py-4 flex justify-between items-center focus:outline-none accordion-header">
        <span class="font-semibold text-white">Is it suitable for startups?</span>
        <span class="text-gray-400">+</span>
      </button>
      <div class="px-6 py-4 hidden accordion-body text-gray-400">
        Yes! Designed for enterprise and startup SaaS projects alike.
      </div>
    </div>

  </div>

</section>

<script>
  // Accordion functionality
  const headers = document.querySelectorAll('.accordion-header');

  headers.forEach(header => {
    header.addEventListener('click', () => {
      const body = header.nextElementSibling;
      const isOpen = !body.classList.contains('hidden');

      // Close all other accordion bodies
      document.querySelectorAll('.accordion-body').forEach(b => b.classList.add('hidden'));
      document.querySelectorAll('.accordion-header span:last-child').forEach(s => s.textContent = '+');

      // Toggle current
      if (!isOpen) {
        body.classList.remove('hidden');
        header.querySelector('span:last-child').textContent = '−';
      }
    });
  });
</script>

</body>
</html>
