<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing 1</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans">

<section class="max-w-7xl mx-auto px-6 py-20">

  <h2 class="text-4xl font-bold text-white text-center mb-12">
    AI Platform Pricing
  </h2>

  <div class="grid md:grid-cols-3 gap-8">

    <!-- Starter -->
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-800">
      <h3 class="text-white text-xl font-semibold mb-4">Starter</h3>
      <p class="text-4xl font-bold text-white mb-6">$19<span class="text-gray-400 text-lg">/mo</span></p>

      <ul class="space-y-3 mb-8">
        <li>AI analytics dashboard</li>
        <li>Basic automation</li>
        <li>Email support</li>
      </ul>

      <button class="w-full py-3 rounded-lg bg-indigo-500 text-white hover:bg-indigo-600 transition">
        Choose Plan
      </button>
    </div>

    <!-- Pro -->
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-800">
      <h3 class="text-white text-xl font-semibold mb-4">Pro</h3>
      <p class="text-4xl font-bold text-white mb-6">$49<span class="text-gray-400 text-lg">/mo</span></p>

      <ul class="space-y-3 mb-8">
        <li>Advanced AI automation</li>
        <li>API access</li>
        <li>Priority support</li>
      </ul>

      <button class="w-full py-3 rounded-lg bg-indigo-500 text-white hover:bg-indigo-600 transition">
        Choose Plan
      </button>
    </div>

    <!-- Enterprise -->
    <div class="bg-gray-900 p-8 rounded-xl border border-gray-800">
      <h3 class="text-white text-xl font-semibold mb-4">Enterprise</h3>
      <p class="text-4xl font-bold text-white mb-6">$99<span class="text-gray-400 text-lg">/mo</span></p>

      <ul class="space-y-3 mb-8">
        <li>Full AI infrastructure</li>
        <li>Custom integrations</li>
        <li>Dedicated support</li>
      </ul>

      <button class="w-full py-3 rounded-lg bg-indigo-500 text-white hover:bg-indigo-600 transition">
        Choose Plan
      </button>
    </div>

  </div>

</section>

</body>
</html>
