<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero 2</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-950 text-gray-400 font-sans">

<section class="max-w-7xl mx-auto px-6 py-24">

  <div class="grid md:grid-cols-2 gap-12 items-center">

    <!-- Left Content -->
    <div>

      <h1 class="text-5xl md:text-6xl font-bold text-white mb-6 leading-tight">
        Automate
        <span class="bg-gradient-to-r from-indigo-500 to-blue-500 bg-clip-text text-transparent">
          Intelligence
        </span>
        at Scale
      </h1>

      <p class="text-lg text-gray-400 mb-10 max-w-xl">
        Build powerful automation pipelines using advanced artificial
        intelligence infrastructure designed for high-growth businesses
        and enterprise platforms.
      </p>

      <div class="flex gap-4 flex-wrap">

        <button class="px-6 py-3 rounded-lg bg-gradient-to-r from-indigo-500 to-blue-500 text-white font-semibold hover:scale-105 transition duration-300 shadow-lg shadow-indigo-500/20">
          Start Free Trial
        </button>

        <button class="px-6 py-3 rounded-lg border border-gray-700 text-gray-300 hover:bg-gray-900 transition duration-300">
          View Demo
        </button>

      </div>

    </div>

    <!-- Right Visual -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 shadow-xl">

      <div class="text-sm text-gray-400 mb-4">
        AI Dashboard Preview
      </div>

      <div class="space-y-4">

        <div class="h-4 bg-gray-800 rounded"></div>
        <div class="h-4 bg-gray-800 rounded w-5/6"></div>
        <div class="h-4 bg-gray-800 rounded w-4/6"></div>

        <div class="h-24 bg-gradient-to-r from-indigo-500/30 to-blue-500/30 rounded mt-6"></div>

      </div>

    </div>

  </div>

</section>

</body>
</html>
